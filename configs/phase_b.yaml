# Cross-Model Activation Oracle — Phase B Config
# Mismatched dimension experiment: Gemma-2-2B vs Qwen2.5-1.5B
# Gemma d_model=2304, Qwen d_model=1536 (mismatch)
# Allows testing low-rank, ridge, and LASSO alignment methods

# Models (Phase B: Mismatched Dimensions)
model_a:
  name: "google/gemma-2-2b"
  alias: "gemma"
  d_model: 2304

model_b:
  name: "Qwen/Qwen2.5-1.5B"
  alias: "qwen"
  d_model: 1536

# Activation extraction
extraction:
  dataset: "NeelNanda/pile-10k"
  n_prompts: 10000
  max_seq_len: 128
  batch_size: 32
  token_position: "last"  # "last" | "mean" | int (specific position)
  # Layer fractions to extract at (relative depth)
  layer_fractions: [0.0, 0.125, 0.25, 0.375, 0.5, 0.625, 0.75, 0.875, 1.0]
  dtype: "float32"  # Store activations in this dtype

# CKA analysis
cka:
  kernel: "linear"  # "linear" | "rbf"
  # For RBF kernel
  rbf_sigma: null  # null = use median heuristic
  # Debiased CKA (Kornblith et al. 2019)
  debiased: true
  # Subsample for speed (null = use all)
  subsample_n: 5000

# Alignment (Phase B: Multiple methods for mismatched dimensions)
alignment:
  method: "all"  # Try all methods: low_rank, linear (ridge), lasso
  train_fraction: 0.8  # Train/test split for alignment
  # Low-rank (LoRA-style) configuration
  low_rank:
    ranks: [32, 64, 128, 256]  # Test multiple rank values
    regularization: 1.0e-4
  # Ridge (linear) configuration
  linear:
    regularization: 1.0e-4
  # LASSO (sparse) configuration
  lasso:
    regularization: 1.0e-3  # Higher lambda for more sparsity

# Oracle transfer
oracle:
  # HuggingFace adapter ID for the activation oracle
  adapter_id: null  # Set this to the oracle LoRA adapter path
  base_model: "model_b"  # Which model's oracle to use
  test_prompts:
    - "The capital of France is"
    - "Water freezes at"
    - "The theory of relativity was developed by"

# Output
output:
  dir: "outputs/phase_b"
  save_activations: true
  save_alignments: true
  save_plots: true
  wandb:
    enabled: false
    project: "cross-model-activation-oracles"
    entity: null

# Compute
compute:
  device: "cuda"  # "cuda" | "cpu" | "auto"
  seed: 42
